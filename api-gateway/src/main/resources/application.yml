server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: budget-service-route
              uri: lb://budget-service
              predicates:
                - Path=/api/v1/budgets/**, /api/v1/categories/**
              filters:
                - StripPrefix=0
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSE_ENDPOINTS:health,info,metrics,prometheus}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:always}

springdoc:
  api-docs:
    path: ${OPENAPI_API_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}
    enabled: ${SWAGGER_UI_ENABLED:true}
