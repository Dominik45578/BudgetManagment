server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          # CORS handled globally via SecurityConfig.java (CorsConfigurationSource bean)
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSE_ENDPOINTS:health,info,metrics,prometheus}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:always}

logging:
  level:
    com.kowallo.accounts.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
